<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pomodoro Timer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main>
    <div class="header">
      <h1>Pomodoro Timer</h1>
      <button id="settingsBtn" class="no-background" onclick="toggleSettingsPanel()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><!--!Font Awesome Free v7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.--><path d="M259.1 73.5C262.1 58.7 275.2 48 290.4 48L350.2 48C365.4 48 378.5 58.7 381.5 73.5L396 143.5C410.1 149.5 423.3 157.2 435.3 166.3L503.1 143.8C517.5 139 533.3 145 540.9 158.2L570.8 210C578.4 223.2 575.7 239.8 564.3 249.9L511 297.3C511.9 304.7 512.3 312.3 512.3 320C512.3 327.7 511.8 335.3 511 342.7L564.4 390.2C575.8 400.3 578.4 417 570.9 430.1L541 481.9C533.4 495 517.6 501.1 503.2 496.3L435.4 473.8C423.3 482.9 410.1 490.5 396.1 496.6L381.7 566.5C378.6 581.4 365.5 592 350.4 592L290.6 592C275.4 592 262.3 581.3 259.3 566.5L244.9 496.6C230.8 490.6 217.7 482.9 205.6 473.8L137.5 496.3C123.1 501.1 107.3 495.1 99.7 481.9L69.8 430.1C62.2 416.9 64.9 400.3 76.3 390.2L129.7 342.7C128.8 335.3 128.4 327.7 128.4 320C128.4 312.3 128.9 304.7 129.7 297.3L76.3 249.8C64.9 239.7 62.3 223 69.8 209.9L99.7 158.1C107.3 144.9 123.1 138.9 137.5 143.7L205.3 166.2C217.4 157.1 230.6 149.5 244.6 143.4L259.1 73.5zM320.3 400C364.5 399.8 400.2 363.9 400 319.7C399.8 275.5 363.9 239.8 319.7 240C275.5 240.2 239.8 276.1 240 320.3C240.2 364.5 276.1 400.2 320.3 400z"/></svg>
      </button>
      <div id="settingsPanel" class="hidden">
        <label>
          Study:
          <input id="studyInput" class="inputNumberMinimal" oninput="saveStudyTime()" type="number" min="1"> min
        </label>
        <label>
          Break:
          <input id="breakInput" class="inputNumberMinimal" oninput="saveBreakTime()" type="number" min="1"> min
        </label>
        <label>
          Goal:
          <input id="goalInput" class="inputNumberMinimal" oninput="saveGoal()" type="number" min="1">
        </label>
      </div>
    </div>
    
    <div id="popup" class="popup hidden">
      <div class="popup-content">
        <div id="popupMessage"></div>
        <button onclick="closePopup()">OK</button>
      </div>
    </div>

    <div class="flex-column">
      <button id="studyModeLabel" class="active" onclick="switchModeTo('study')">Study</button><button id="breakModeLabel" onclick="switchModeTo('break')">Break</button>
    </div>
    <div class="container-timer-circle">
      <svg width="200" height="200">
        <circle
          cx="100"
          cy="100"
          r="90"
          stroke="#333"
          stroke-width="2"
          fill="none"
        />
        <circle
          id="progressCircle"
          cx="100"
          cy="100"
          r="90"
          stroke="var(--primary-color)"
          stroke-width="10"
          fill="none"
          stroke-linecap="round"
          transform="rotate(-90 100 100)"
        />
      </svg>
      <div id="timerNumber">25:00</div>
    </div>

    <div class="buttons">
      <button id="start" class="no-background" onclick="startTimer()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><!--!Font Awesome Free v7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.--><path d="M187.2 100.9C174.8 94.1 159.8 94.4 147.6 101.6C135.4 108.8 128 121.9 128 136L128 504C128 518.1 135.5 531.2 147.6 538.4C159.7 545.6 174.8 545.9 187.2 539.1L523.2 355.1C536 348.1 544 334.6 544 320C544 305.4 536 291.9 523.2 284.9L187.2 100.9z"/></svg>
      </button>
      <button id="pause" class="no-background hidden" onclick="pauseTimer()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><!--!Font Awesome Free v7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.--><path d="M176 96C149.5 96 128 117.5 128 144L128 496C128 522.5 149.5 544 176 544L240 544C266.5 544 288 522.5 288 496L288 144C288 117.5 266.5 96 240 96L176 96zM400 96C373.5 96 352 117.5 352 144L352 496C352 522.5 373.5 544 400 544L464 544C490.5 544 512 522.5 512 496L512 144C512 117.5 490.5 96 464 96L400 96z"/></svg>
      </button>
      <button id="reset" class="no-background" onclick="resetTimer()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640"><!--!Font Awesome Free v7.2.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license/free Copyright 2026 Fonticons, Inc.--><path d="M320 128C263.2 128 212.1 152.7 176.9 192L224 192C241.7 192 256 206.3 256 224C256 241.7 241.7 256 224 256L96 256C78.3 256 64 241.7 64 224L64 96C64 78.3 78.3 64 96 64C113.7 64 128 78.3 128 96L128 150.7C174.9 97.6 243.5 64 320 64C461.4 64 576 178.6 576 320C576 461.4 461.4 576 320 576C233 576 156.1 532.6 109.9 466.3C99.8 451.8 103.3 431.9 117.8 421.7C132.3 411.5 152.2 415.1 162.4 429.6C197.2 479.4 254.8 511.9 320 511.9C426 511.9 512 425.9 512 319.9C512 213.9 426 128 320 128z"/></svg>
      </button>
    </div>
    <div class="sessions">
      <p>Goal: <span id="sessionCount">0</span> / <span id="sessionGoal">0</span>
      </p>
      <button id="resetSessions" onclick="resetSession()">Reset Goal</button>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
